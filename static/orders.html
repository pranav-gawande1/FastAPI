            /*//////// order-card//////// */
            .order-card {
                display: flex;
                align-items: center;

    <section id="menu">
        <div class="menu-container">
            <h2>Your Orders</h2>
            <div class="order-card">
                <div id="orders"></div>
            </div>
        </div>
    </section>


    <!-- JS for Hamburger Menu -->
    <script>
        const token = localStorage.getItem("token");

        fetch("/orders/user/orders", {
            headers: { Authorization: `Bearer ${token}` }
        })
            .then(res => res.json())
            .then(data => {
                const ordersContainer = document.getElementById("orders");

                if (!Array.isArray(data) || data.length === 0) {
                    ordersContainer.innerHTML = "<p>No orders found.</p>";
                    return;
                }

                ordersContainer.innerHTML = data.map(order => `
        <div class="order-card">
          <div class="order-card-content">
            <div class="product">
              <p class="username">Pizza Name: <strong>Margherita Pizza</strong></p>
              <p class="size">Pizza Size: <strong>${order.pizza_size.value.toUpperCase()}</strong></p>
              <p class="quantity">Quantity: ${order.quantity}</p>
              <p class="cost">Pizza cost: <strong>${order.quantity*(100)}</strong></p>
              <p class="status">Status: <span style="color: orange;">${order.order_status.value.toUpperCase()}</span></p>
            </div>
          </div>
        </div>
      `).join('');
            })
            .catch(err => {
                console.error("Error fetching orders:", err);
                document.getElementById("orders").innerHTML = "<p>Failed to load orders. Please try again.</p>";
            });

    </script>
